<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Without Telegram | PREMIUM STORE</title>
  <meta name="description" content="Telegram မသုံးဘဲ website ကနေတိုက်ရိုက် order တင်နိုင်ပါသည်။ ငွေလွှဲ screenshot ကို ဒီမှာတင်ပါ။" />
  <meta name="theme-color" content="#00d2ff" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="assets/components.css" />
</head>
<body>

  <div class="order-summary" id="order-summary" style="display:none"></div>

  <div class="order-form-card">
    <h2><i class="fa-solid fa-file-invoice"></i> Order တင်ရန်</h2>
    <p class="of-sub"> ငွေလွှဲပြီး screenshot တင်လိုက်ပါ။ Admin က <strong>Viber or Telegram</strong> ကနေ ပြန်ဆက်သွယ်ပါမယ်။<br/>Form မတင်ချင်ရင်  <a href="https://www.messenger.com/t/happyyou2020" target="_blank" rel="noopener" style="color:#00d2ff">Page Messenger</a> ကို screenshot တိုက်ရိုက်ပို့လို့လည်း ရပါတယ်။</p>

    <form id="orderForm">
      <div class="of-field">
        <label for="of-name">နာမည် *</label>
        <input type="text" id="of-name" name="name" required maxlength="60" placeholder="သင့်နာမည်" />
      </div>

      <div class="of-field">
        <label for="of-product">ဝယ်ယူလိုသည့် ပစ္စည်း *</label>
        <input type="text" id="of-product" name="product" required maxlength="120" placeholder="ဥပမာ - Netflix 1 Month" />
      </div>

      <div class="of-field" id="of-mail-field" style="display:none">
        <label for="of-mail" id="of-mail-label">Upgrade လုပ်မည့် သင့် Email *</label>
        <input type="email" id="of-mail" name="customer_mail" maxlength="120" placeholder="yourname@gmail.com" autocomplete="off" />
        <p id="of-mail-hint" style="font-size:0.78rem;color:rgba(255,255,255,0.55);margin:6px 0 0"></p>
      </div>

      <div class="of-field" id="of-pw-field" style="display:none">
        <label for="of-pw">Gmail Password (optional)</label>
        <input type="text" id="of-pw" name="customer_pw" maxlength="100" placeholder="Gmail password" autocomplete="off" />
      </div>

      <div class="of-field">
        <label for="of-payment">ငွေလွှဲထားသည့် နည်းလမ်း *</label>
        <select id="of-payment" name="payment" required>
          <option value="">ရွေးပါ</option>
          <option>KBZ Pay</option>
          <option>Wave Pay</option>
          <option>AYA Pay</option>
          <option>Other</option>
        </select>
      </div>

      <div class="of-field">
        <label for="of-contact">ပြန်ဆက်သွယ်ရန် Viber နံပါတ် သို့မဟုတ် Telegram Username *</label>
        <input type="text" id="of-contact" name="contact" required maxlength="40" placeholder="09xxxxxxxxx (သို့) @username" autocomplete="off" />
      </div>

      <div class="of-field">
        <label>ငွေလွှဲ Screenshot *</label>
        <label class="of-file" id="of-file-label" for="of-file">
          <i class="fa-solid fa-image"></i> <span id="of-file-text">Screenshot ရွေးရန် နှိပ်ပါ</span>
        </label>
        <input type="file" id="of-file" name="screenshot" accept="image/*" required style="display:none" />
      </div>

      <div class="of-field">
        <label for="of-note">မှတ်ချက် (optional)</label>
        <textarea id="of-note" name="note" rows="2" maxlength="300" placeholder="ထပ်ဖြည့်ပြောချင်တာရှိရင် ရေးပါ"></textarea>
      </div>

      <input type="text" name="website" id="of-hp" style="display:none" tabindex="-1" autocomplete="off" />

      <button type="submit" class="of-submit" id="of-submit">
        <i class="fa-solid fa-paper-plane"></i> Order တင်မယ်
      </button>
    </form>

    <div class="of-result" id="of-result"></div>
  </div>

  <script src="assets/app.js?v=2" defer></script>
  <script src="assets/order.js" defer></script>
</body>
</html>
