<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Without Telegram | PREMIUM STORE</title>
  <meta name="description" content="Telegram မသုံးဘဲ website ကနေတိုက်ရိုက် order တင်နိုင်ပါသည်။ ငွေလွှဲ screenshot ကို ဒီမှာတင်ပါ။" />
  <meta name="theme-color" content="#00d2ff" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="assets/components.css" />
</head>
<body>

  <div class="order-summary" id="order-summary" style="display:none"></div>

  <div class="order-form-card">
    <h2><i class="fa-solid fa-file-invoice"></i> Order တင်ရန်</h2>
    <p class="of-sub"> ငွေလွှဲပြီး screenshot တင်လိုက်ပါ။ Admin က <strong>Viber or Telegram</strong> ကနေ ပြန်ဆက်သွယ်ပါမယ်။<br/>Form မတင်ချင်ရင်  <a href="https://www.messenger.com/t/happyyou2020" target="_blank" rel="noopener" style="color:#00d2ff">Page Messenger</a> ကို screenshot တိုက်ရိုက်ပို့လို့လည်း ရပါတယ်။</p>

    <form id="orderForm">
      <div class="of-field">
        <label for="of-name">နာမည် *</label>
        <input type="text" id="of-name" name="name" required maxlength="60" placeholder="သင့်နာမည်" />
      </div>

      <div class="of-field">
        <label for="of-product">ဝယ်ယူလိုသည့် ပစ္စည်း *</label>
        <input type="text" id="of-product" name="product" required maxlength="120" placeholder="ဥပမာ - Netflix 1 Month" />
      </div>

      <div class="of-field" id="of-mail-field" style="display:none">
        <label for="of-mail" id="of-mail-label">Upgrade လုပ်မည့် သင့် Email *</label>
        <input type="email" id="of-mail" name="customer_mail" maxlength="120" placeholder="yourname@gmail.com" autocomplete="off" />
        <p id="of-mail-hint" style="font-size:0.78rem;color:rgba(255,255,255,0.55);margin:6px 0 0"></p>
      </div>

      <div class="of-field" id="of-pw-field" style="display:none">
        <label for="of-pw">Gmail Password (optional)</label>
        <input type="text" id="of-pw" name="customer_pw" maxlength="100" placeholder="Gmail password" autocomplete="off" />
      </div>

      <div class="of-field">
        <label for="of-payment">ငွေလွှဲထားသည့် နည်းလမ်း *</label>
        <select id="of-payment" name="payment" required>
          <option value="">ရွေးပါ</option>
          <option>KBZ Pay</option>
          <option>Wave Pay</option>
          <option>AYA Pay</option>
          <option>Other</option>
        </select>
      </div>

      <div class="of-field">
        <label for="of-contact">ပြန်ဆက်သွယ်ရန် Viber နံပါတ် သို့မဟုတ် Telegram Username *</label>
        <input type="text" id="of-contact" name="contact" required maxlength="40" placeholder="09xxxxxxxxx (သို့) @username" autocomplete="off" />
      </div>

      <div class="of-field">
        <label>ငွေလွှဲ Screenshot *</label>
        <label class="of-file" id="of-file-label" for="of-file">
          <i class="fa-solid fa-image"></i> <span id="of-file-text">Screenshot ရွေးရန် နှိပ်ပါ</span>
        </label>
        <input type="file" id="of-file" name="screenshot" accept="image/*" required style="display:none" />
      </div>

      <div class="of-field">
        <label for="of-note">မှတ်ချက် (optional)</label>
        <textarea id="of-note" name="note" rows="2" maxlength="300" placeholder="ထပ်ဖြည့်ပြောချင်တာရှိရင် ရေးပါ"></textarea>
      </div>

      <input type="text" name="website" id="of-hp" style="display:none" tabindex="-1" autocomplete="off" />

      <button type="submit" class="of-submit" id="of-submit">
        <i class="fa-solid fa-paper-plane"></i> Order တင်မယ်
      </button>
    </form>

    <div class="of-result" id="of-result"></div>
  </div>

  <script src="assets/app.js" defer></script>
  <script>
    (function () {
      var fileInput = document.getElementById('of-file');
      var fileLabel = document.getElementById('of-file-label');
      var fileText = document.getElementById('of-file-text');
      fileInput.addEventListener('change', function () {
        if (fileInput.files.length) {
          fileText.textContent = fileInput.files[0].name;
          fileLabel.classList.add('has-file');
        }
      });

      // ---- Product-specific extra fields ----
      // Own-mail products: customer email required (upgrade သင့် mail ပေါ်မှာလုပ်ရလို့)
      var MAIL_REQUIRED = ['zoom', 'canva', 'duolingo'];
      // Gemini: gmail + password optional (မဖြည့်ရင် admin ဆက်သွယ်ချိန်ပေးလို့ရ)
      var MAIL_PW_OPTIONAL = ['gemini'];

      var productInput = document.getElementById('of-product');
      var mailField = document.getElementById('of-mail-field');
      var mailInput = document.getElementById('of-mail');
      var mailLabel = document.getElementById('of-mail-label');
      var mailHint = document.getElementById('of-mail-hint');
      var pwField = document.getElementById('of-pw-field');
      var pwInput = document.getElementById('of-pw');
      var allProducts = null;
      var currentProductId = '';

      function updateExtraFields() {
        var needMail = MAIL_REQUIRED.indexOf(currentProductId) !== -1;
        var isGemini = MAIL_PW_OPTIONAL.indexOf(currentProductId) !== -1;
        if (needMail) {
          mailField.style.display = '';
          pwField.style.display = 'none';
          pwInput.value = '';
          mailInput.required = true;
          mailLabel.textContent = 'Upgrade လုပ်မည့် သင့် Email *';
          mailHint.textContent = 'ဒီ product က သင့် mail ပေါ်မှာ တင်ပေးရတာမို့ Email ဖြည့်ပေးပါ။';
        } else if (isGemini) {
          mailField.style.display = '';
          pwField.style.display = '';
          mailInput.required = false;
          mailLabel.textContent = 'Gmail (optional)';
          mailHint.textContent = 'Gemini က သင့် Gmail + Password နဲ့ တင်ပေးရပါတယ်။ အခုမဖြည့်ချင်ရင် Admin ဆက်သွယ်လာချိန် ပေးလို့ရပါတယ်။';
        } else {
          mailField.style.display = 'none';
          pwField.style.display = 'none';
          mailInput.required = false;
          mailInput.value = '';
          pwInput.value = '';
        }
      }

      function resolveProductId(text) {
        var t = (text || '').toLowerCase();
        if (!t) return '';
        var best = '', bestLen = 0;
        (allProducts || []).forEach(function (p) {
          var n = (p.name || '').toLowerCase();
          if (n && t.indexOf(n) !== -1 && n.length > bestLen) { best = p.id; bestLen = n.length; }
        });
        if (best) return best;
        if (t.indexOf('canva') !== -1) return 'canva';
        if (t.indexOf('zoom') !== -1) return 'zoom';
        if (t.indexOf('gemini') !== -1) return 'gemini';
        if (t.indexOf('duolingo') !== -1 && t.indexOf('crack') === -1) return 'duolingo';
        return '';
      }

      productInput.addEventListener('input', function () {
        currentProductId = resolveProductId(productInput.value);
        updateExtraFields();
      });

      // Load products.json (prefill from ?product=xxx&plan=yyy + name matching အတွက်)
      var q = new URLSearchParams(location.search);
      fetch('products.json', { cache: 'no-cache' }).then(function (r) { return r.json(); }).then(function (d) {
        allProducts = d.products || [];
        var pid = q.get('product');
        if (pid) {
          var p = allProducts.find(function (x) { return x.id === pid; });
          if (!p) return;
          var plan = (p.plans || []).find(function (x) { return x.id === q.get('plan'); });
          productInput.value = p.name + (plan ? ' — ' + plan.name + (plan.price ? ' (' + plan.price + ')' : '') : '');
          currentProductId = p.id;
          updateExtraFields();
        } else if (productInput.value) {
          currentProductId = resolveProductId(productInput.value);
          updateExtraFields();
        }
      }).catch(function () {});

      document.getElementById('orderForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var btn = document.getElementById('of-submit');
        var result = document.getElementById('of-result');
        var f = fileInput.files[0];
        if (f && f.size > 8 * 1024 * 1024) {
          result.className = 'of-result err';
          result.textContent = 'Screenshot ဖိုင်က 8MB ထက်ကြီးနေပါတယ်။ ပိုသေးတဲ့ပုံပြန်ရွေးပေးပါ။';
          return;
        }
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ပို့နေသည်…';
        result.className = 'of-result';

        var fd = new FormData(e.target);
        fetch('/api/order', { method: 'POST', body: fd })
          .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
          .then(function (res) {
            if (res.ok && res.j.ok) {
              result.className = 'of-result ok';
              result.innerHTML =
                '<strong><i class="fa-solid fa-circle-check"></i> Order တင်ပြီးပါပြီ!</strong><br/>' +
                'Order ID: <strong>' + res.j.orderId + '</strong><br/>' +
                'Admin က Viber <strong>09 953 362 620</strong> ကနေ မကြာခင် ပြန်ဆက်သွယ်ပါမယ် — အဲ့နံပါတ်က message ကို လက်ခံပေးပါ။<br/>' +
                'Facebook နဲ့လည်း ဆက်သွယ်နိုင်ပါတယ် — အောက်ကခလုတ်နှိပ်ပြီး Order ID ကို ပို့ထားပါ:<br/>' +
                '<a class="of-fb-btn" target="_blank" rel="noopener" rel="noopener" href="' + res.j.fbLink + '"><i class="fa-brands fa-facebook-messenger"></i> Facebook Page ကို စာပို့မယ်</a>';
              e.target.reset();
              fileText.textContent = 'Screenshot ရွေးရန် နှိပ်ပါ';
              fileLabel.classList.remove('has-file');
            } else {
              throw new Error(res.j.error || 'failed');
            }
          })
          .catch(function () {
            result.className = 'of-result err';
            result.innerHTML = 'Order ပို့မရသေးပါ။ Internet ပြန်စစ်ပြီး ထပ်ကြိုးစားပါ (သို့) Telegram Bot <a href="https://t.me/PSNamso_bot" style="color:#00d2ff">@PSNamso_bot</a> ကနေ ဝယ်ယူနိုင်ပါတယ်။';
          })
          .finally(function () {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Order တင်မယ်';
          });
      });
    })();
  </script>
</body>
</html>
